<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nassar Dev</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>🚀 Nassar Dev</h1>

<h2>📂 معرض أعمالي</h2>
<div class="projects-container">
    {% for project in projects %}
    <div class="card">
        <img src="{{ url_for('static', filename='img/' + project.image_url) }}">
        <p>{{ project.title }}</p>
    </div>
    {% endfor %}
</div>

<div class="card">
    <h3>📩 تواصل</h3>
    <form method="POST" action="/send">
        <input name="name" placeholder="الاسم" required>
        <input name="email" placeholder="الإيميل" required>
        <textarea name="message"></textarea>
        <button>إرسال</button>
    </form>
</div>

<div class="card">
    <h3>💰 اطلب موقع</h3>
    <form method="POST" action="/order">
        <input name="name" placeholder="اسمك">
        <input name="phone" placeholder="رقمك">
        <select name="service">
            <option>موقع شخصي</option>
            <option>متجر</option>
        </select>
        <button>طلب</button>
    </form>
</div>

<div class="chat-box">
    <input id="userInput">
    <button onclick="sendMsg()">إرسال</button>
    <div id="response"></div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
